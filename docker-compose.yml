services:
  # ==========================================
  # ZOOKEEPER
  # ==========================================

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - recommendation_network

  # ==========================================
  # KAFKA
  # ==========================================

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    restart: always
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - recommendation_network

  # ==========================================
  # POSTGRESQL - MAIN DB
  # ==========================================

  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: movies_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - recommendation_network

  # ==========================================
  # POSTGRESQL - MLFLOW DB
  # ==========================================

  mlflow-postgres:
    image: postgres:15
    container_name: mlflow-postgres
    restart: always
    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow
      POSTGRES_DB: mlflow
    ports:
      - "5434:5432"
    volumes:
      - mlflow_postgres_data:/var/lib/postgresql/data
    networks:
      - recommendation_network

  # ==========================================
  # REDIS CACHE
  # ==========================================

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - recommendation_network

  # ==========================================
  # MLFLOW TRACKING SERVER
  # ==========================================

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow
    restart: always
    depends_on:
      - mlflow-postgres
    ports:
      - "5000:5000"
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://mlflow:mlflow@mlflow-postgres:5432/mlflow
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /mlflow/artifacts
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    command: mlflow server --backend-store-uri postgresql://mlflow:mlflow@mlflow-postgres:5432/mlflow --default-artifact-root /mlflow/artifacts --host 0.0.0.0 --port 5000
    networks:
      - recommendation_network

  # ==========================================
  # KAFKA PRODUCER (LOCAL BUILD)
  # ==========================================

  producer:
    build: ./kafka-producer
    container_name: producer
    restart: always
    depends_on:
      - kafka
      - postgres
    command: >
      sh -c "
      sleep 30 &&
      python producer.py
      "
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DATABASE_URL: postgresql://admin:admin@postgres:5432/movies_db
    networks:
      - recommendation_network

  # ==========================================
  # SPARK STREAMING (LOCAL BUILD)
  # ==========================================

  spark:
    build: ./spark-streaming
    container_name: spark
    restart: always
    depends_on:
      - kafka
      - postgres
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DATABASE_URL: postgresql://admin:admin@postgres:5432/movies_db
    networks:
      - recommendation_network

  # ==========================================
  # ML MODEL SERVER (LOCAL BUILD)
  # ==========================================

  ml-server:
    build:
      context: ./ml-models
      dockerfile: Dockerfile.serving
    container_name: ml-server
    restart: always
    depends_on:
      - postgres
      - redis
      - mlflow
    environment:
      DATABASE_URL: postgresql://admin:admin@postgres:5432/movies_db
      REDIS_URL: redis://redis:6379/0
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MODEL_PATH: /models
      LOG_LEVEL: INFO
    ports:
      - "8001:8001"
    volumes:
      - ./ml-models:/app
      - ml_models_data:/models
    networks:
      - recommendation_network

  # ==========================================
  # FASTAPI - MAIN API (LOCAL BUILD)
  # ==========================================

  api:
    build: ./fastapi-services
    container_name: api
    restart: always
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://admin:admin@postgres:5432/movies_db
      REDIS_URL: redis://redis:6379/0
      ML_SERVER_URL: http://ml-server:8001
      API_PORT: 8000
      LOG_LEVEL: INFO
    networks:
      - recommendation_network

  # ==========================================
  # STREAMLIT DASHBOARD (LOCAL BUILD)
  # ==========================================

  dashboard:
    build: ./dashboard
    container_name: dashboard
    restart: always
    depends_on:
      - postgres
    ports:
      - "8501:8501"
    environment:
      DATABASE_URL: postgresql://admin:admin@postgres:5432/movies_db
    volumes:
      - ./dashboard:/app
    command: streamlit run dashboard.py --server.port=8501 --server.address=0.0.0.0
    networks:
      - recommendation_network

  # ==========================================
  # AIRFLOW POSTGRES DATABASE
  # ==========================================

  airflow-postgres:
    image: postgres:15
    container_name: airflow-postgres
    restart: always
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5433:5432"
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    networks:
      - recommendation_network

  # ==========================================
  # AIRFLOW (LOCAL BUILD)
  # ==========================================

  airflow:
    build: ./airflow
    container_name: airflow
    restart: always
    depends_on:
      - airflow-postgres
      - postgres
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      DATABASE_URL: postgresql://admin:admin@postgres:5432/movies_db
      MLFLOW_TRACKING_URI: http://mlflow:5000
    command: standalone
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./ml-models:/opt/airflow/ml-models
      - airflow_logs:/opt/airflow/logs
    networks:
      - recommendation_network

networks:
  recommendation_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  mlflow_postgres_data:
    driver: local
  mlflow_artifacts:
    driver: local
  redis_data:
    driver: local
  kafka_data:
    driver: local
  ml_models_data:
    driver: local
  airflow_postgres_data:
    driver: local
  airflow_logs:
    driver: local
